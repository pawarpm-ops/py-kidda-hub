services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pytest_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pytest_platform
      JWT_SECRET: change-this-secret-before-deploying
      CORS_ORIGIN: http://localhost:5173
      EXECUTION_MODE: docker
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres_data:
